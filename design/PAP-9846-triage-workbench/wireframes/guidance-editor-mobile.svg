      <text x="12" y="20">B</text><text x="32" y="20">I</text><text x="52" y="20">H1</text><text x="80" y="20">H2</text><text x="108" y="20">List</text>
      <text x="331" y="20" text-anchor="end">Markdown</text>
    </g>
    <g font-size="14" stroke="none" fill="#000">
      <text x="12" y="56"># content-training · guidance</text>
      <text x="12" y="76" font-size="12" fill="#666">Working memory for the Triage Assistant.</text>
      <text x="12" y="108">## Tone</text>
      <text x="12" y="132" font-size="12">- Plain language.</text>
      <text x="12" y="152" font-size="12">- Keep intros under 4 sentences.</text>
      <text x="12" y="184">## Structure</text>
      <text x="12" y="208" font-size="12">- H2 sections for What's new, Why,</text>
      <text x="12" y="224" font-size="12">  What's next.</text>
      <text x="12" y="248" font-size="12">- Headlines must include a concrete verb.</text>
      <text x="12" y="280">## Tags</text>
      <text x="12" y="304" font-size="12">- See style.md.</text>
      <text x="12" y="332">## Examples</text>
      <text x="12" y="356" font-size="12">- See examples.md.</text>
      <text x="12" y="396" font-size="12" fill="#666">| (tap to edit)</text>
    </g>
  </g>

  <!-- Sticky bottom -->
  <line x1="0" y1="728" x2="375" y2="728" />
  <g transform="translate(16,744)">
    <rect width="160" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
