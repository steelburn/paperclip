<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="812" />

  <line x1="0" y1="48" x2="375" y2="48" />
  <g font-size="14" stroke="none">
    <text x="16" y="30" fill="#000">‹  Workflow</text>
    <text x="359" y="30" text-anchor="end" fill="#666">Save</text>
  </g>

  <g transform="translate(16,72)" stroke="none">
    <text font-size="20" fill="#000">content-training</text>
    <text font-size="12" fill="#666" y="20">4 states · 4 transitions</text>
  </g>

  <!-- Section: Preview accordion -->
  <g transform="translate(16,128)">
    <rect width="343" height="48" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="12" y="20" font-size="14" stroke="none" fill="#000">Preview</text>
    <text x="12" y="36" font-size="12" stroke="none" fill="#666">Read-only graph view</text>
    <text x="331" y="28" text-anchor="end" font-size="14" stroke="none" fill="#000">▾</text>
  </g>

  <!-- States section -->
  <g transform="translate(16,200)" stroke="none">
    <text font-size="14" fill="#000">States</text>
    <text font-size="12" fill="#666" y="16">4</text>
  </g>
  <g transform="translate(16,232)">
    <rect width="343" height="56" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="12" y="22" font-size="14" stroke="none" fill="#000">new  ·  New</text>
    <text x="12" y="40" font-size="12" stroke="none" fill="#666">active · sort 0</text>
    <text x="331" y="34" text-anchor="end" font-size="14" stroke="none" fill="#666">⋯</text>
  </g>
  <g transform="translate(16,296)">
    <rect width="343" height="56" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="12" y="22" font-size="14" stroke="none" fill="#000">approved  ·  Approved</text>
    <text x="12" y="40" font-size="12" stroke="none" fill="#666">archived · sort 1</text>
    <text x="331" y="34" text-anchor="end" font-size="14" stroke="none" fill="#666">⋯</text>
  </g>
  <g transform="translate(16,360)">
    <rect width="343" height="56" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="12" y="22" font-size="14" stroke="none" fill="#000">rejected  ·  Rejected</text>
    <text x="12" y="40" font-size="12" stroke="none" fill="#666">archived · sort 2</text>
    <text x="331" y="34" text-anchor="end" font-size="14" stroke="none" fill="#666">⋯</text>
  </g>
  <g transform="translate(16,424)">
    <rect width="343" height="56" rx="4" fill="#fff" stroke="#000" stroke-width="3" />
    <text x="12" y="22" font-size="14" stroke="none" fill="#000">done  ·  Done</text>
    <text x="12" y="40" font-size="12" stroke="none" fill="#666">terminal · hidden · sort 3</text>
    <text x="331" y="34" text-anchor="end" font-size="14" stroke="none" fill="#666">⋯</text>
  </g>
  <g transform="translate(16,496)">
    <rect width="120" height="32" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="60" y="20" text-anchor="middle" font-size="12" stroke="none" fill="#000">+ Add state</text>
  </g>

  <line x1="16" y1="552" x2="359" y2="552" />

  <!-- Transitions -->
  <g transform="translate(16,576)" stroke="none">
    <text font-size="14" fill="#000">Transitions</text>
    <text font-size="12" fill="#666" y="16">4</text>
  </g>
  <g transform="translate(16,608)">
    <rect width="343" height="80" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="12" y="22" font-size="14" stroke="none" fill="#000">Approve · new → approved</text>
    <text x="12" y="40" font-size="12" stroke="none" fill="#666">reflection required</text>
    <g transform="translate(12,48)">
      <rect width="216" height="20" rx="10" fill="#e6e6e6" stroke="none" />
      <text x="108" y="14" text-anchor="middle" font-size="12" stroke="none" fill="#000">create_or_update_issue</text>
    </g>
  </g>
  <g transform="translate(16,704)">
    <rect width="343" height="56" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="12" y="22" font-size="14" stroke="none" fill="#000">Reject · new → rejected</text>
    <text x="12" y="40" font-size="12" stroke="none" fill="#666">reflection required · no action</text>
  </g>
  <g transform="translate(16,776)">
    <rect width="120" height="32" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="60" y="20" text-anchor="middle" font-size="12" stroke="none" fill="#000">+ Add transition</text>
  </g>
</svg>
