<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <line x1="0" y1="56" x2="1280" y2="56" />
  <text x="24" y="36" font-size="14" stroke="none" fill="#000">Paperclip</text>
  <text x="120" y="36" font-size="14" stroke="none" fill="#666">/  Triage  /  content-training  /  Workflow</text>

  <!-- Route sidebar (collapsed labels for space) -->
  <line x1="240" y1="56" x2="240" y2="800" />
  <g transform="translate(16,80)" stroke="none" font-size="12" fill="#666"><text>QUEUE</text></g>
  <g font-size="14" stroke="none" fill="#000">
    <text x="16" y="120">Workbench</text>
    <text x="16" y="144">Items</text>
    <text x="16" y="168">Guidance</text>
    <rect x="8" y="184" width="216" height="32" stroke="none" fill="#e6e6e6" />
    <text x="16" y="204">Workflow</text>
    <text x="16" y="236">Transition actions</text>
    <text x="16" y="260">Settings</text>
  </g>

  <!-- Header -->
  <g transform="translate(280,80)" stroke="none">
    <text font-size="28" fill="#000">Workflow</text>
    <text font-size="14" fill="#666" y="32">Allowed states and transitions for content-training. Internal validator (no library).</text>
  </g>

  <!-- Visual graph (preview, read-only) -->
  <g transform="translate(280,168)">
    <text font-size="14" stroke="none" fill="#000">Preview</text>
    <text font-size="12" stroke="none" fill="#666" y="16">Generated from the records below — not a drag-and-drop editor.</text>
  </g>
  <g transform="translate(280,200)">
    <rect width="960" height="120" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />

    <!-- new -->
    <g transform="translate(48,40)"><rect width="120" height="40" rx="20" fill="#e6e6e6" stroke="#000" stroke-width="1.5" /><text x="60" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">new</text></g>
    <!-- approved -->
    <g transform="translate(320,16)"><rect width="120" height="40" rx="20" fill="#fff" stroke="#000" stroke-width="1.5" /><text x="60" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">approved</text></g>
    <!-- rejected -->
    <g transform="translate(320,64)"><rect width="120" height="40" rx="20" fill="#fff" stroke="#000" stroke-width="1.5" /><text x="60" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">rejected</text></g>
    <!-- done (terminal) -->
    <g transform="translate(640,40)"><rect width="120" height="40" rx="20" fill="#fff" stroke="#000" stroke-width="3" /><text x="60" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">done · terminal</text></g>

    <!-- arrows -->
    <g stroke="#000" stroke-width="1.5" fill="none">
      <line x1="168" y1="56" x2="320" y2="36" />
      <line x1="168" y1="64" x2="320" y2="84" />
      <line x1="440" y1="36" x2="640" y2="56" />
      <line x1="440" y1="84" x2="640" y2="64" />
    </g>
    <g font-size="12" stroke="none" fill="#666">
      <text x="240" y="36">Approve</text>
      <text x="240" y="100">Reject</text>
      <text x="544" y="36">Finish</text>
      <text x="544" y="100">Finish</text>
    </g>
  </g>

  <!-- States table -->
  <g transform="translate(280,360)" stroke="none">
    <text font-size="20" fill="#000">States</text>
    <text font-size="12" fill="#666" y="16">stateKey · label · terminal · visibility · sortOrder</text>
  </g>
  <g transform="translate(280,400)">
    <rect width="960" height="184" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="32" x2="960" y2="32" />
    <g font-size="12" stroke="none" fill="#666">
      <text x="16" y="20">KEY</text>
      <text x="160" y="20">LABEL</text>
      <text x="320" y="20">TERMINAL</text>
      <text x="448" y="20">VISIBILITY</text>
      <text x="640" y="20">SORT</text>
      <text x="944" y="20" text-anchor="end">⋯</text>
    </g>
    <g font-size="14" stroke="none" fill="#000">
      <text x="16" y="56">new</text><text x="160" y="56">New</text><text x="320" y="56" fill="#666">false</text><text x="448" y="56" fill="#666">active</text><text x="640" y="56" fill="#666">0</text>
      <line x1="0" y1="72" x2="960" y2="72" stroke="#e6e6e6" />
      <text x="16" y="96">approved</text><text x="160" y="96">Approved</text><text x="320" y="96" fill="#666">false</text><text x="448" y="96" fill="#666">archived</text><text x="640" y="96" fill="#666">1</text>
      <line x1="0" y1="112" x2="960" y2="112" stroke="#e6e6e6" />
      <text x="16" y="136">rejected</text><text x="160" y="136">Rejected</text><text x="320" y="136" fill="#666">false</text><text x="448" y="136" fill="#666">archived</text><text x="640" y="136" fill="#666">2</text>
      <line x1="0" y1="152" x2="960" y2="152" stroke="#e6e6e6" />
      <text x="16" y="176">done</text><text x="160" y="176">Done</text><text x="320" y="176" fill="#000" font-weight="bold">true</text><text x="448" y="176" fill="#666">hidden</text><text x="640" y="176" fill="#666">3</text>
    </g>
  </g>
  <g transform="translate(280,592)">
    <rect width="120" height="32" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="60" y="20" text-anchor="middle" font-size="12" stroke="none" fill="#000">+ Add state</text>
  </g>

  <!-- Transitions table -->
  <g transform="translate(280,640)" stroke="none">
    <text font-size="20" fill="#000">Transitions</text>
    <text font-size="12" fill="#666" y="16">transitionKey · from → to · label · reflection? · action template</text>
  </g>
  <!-- list (compressed: 4 rows) -->
  <g transform="translate(280,680)">
    <rect width="960" height="104" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
    <g font-size="14" stroke="none" fill="#000">
      <text x="16" y="24">new.approve</text><text x="200" y="24" fill="#666">new → approved</text><text x="400" y="24">Approve</text><text x="560" y="24">required</text>
      <g transform="translate(680,8)"><rect width="200" height="20" rx="10" fill="#e6e6e6" /><text x="100" y="14" text-anchor="middle" font-size="12" stroke="none" fill="#000">create_or_update_issue</text></g>
      <text x="944" y="24" text-anchor="end" fill="#666">⋯</text>

      <line x1="0" y1="32" x2="960" y2="32" stroke="#e6e6e6" />
      <text x="16" y="56">new.reject</text><text x="200" y="56" fill="#666">new → rejected</text><text x="400" y="56">Reject</text><text x="560" y="56">required</text>
      <text x="700" y="56" font-size="12" fill="#666">no action</text>
      <text x="944" y="56" text-anchor="end" fill="#666">⋯</text>

      <line x1="0" y1="64" x2="960" y2="64" stroke="#e6e6e6" />
      <text x="16" y="88">approved.finish</text><text x="200" y="88" fill="#666">approved → done</text><text x="400" y="88">Finish</text><text x="560" y="88" fill="#666">no</text>
      <text x="700" y="88" font-size="12" fill="#666">no action</text>
      <text x="944" y="88" text-anchor="end" fill="#666">⋯</text>
    </g>
  </g>

  <!-- annotations -->
  <g font-size="12" font-weight="bold" stroke="none" fill="#d33">
    <circle cx="272" cy="200" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="204" text-anchor="middle">1</text>
    <circle cx="272" cy="400" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="404" text-anchor="middle">2</text>
    <circle cx="272" cy="680" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="684" text-anchor="middle">3</text>
    <circle cx="552" cy="688" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="552" y="692" text-anchor="middle">4</text>
  </g>
</svg>
