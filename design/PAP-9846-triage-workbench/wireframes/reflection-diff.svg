<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <line x1="0" y1="56" x2="1280" y2="56" />
  <text x="24" y="36" font-size="14" stroke="none" fill="#000">Paperclip</text>
  <text x="120" y="36" font-size="14" stroke="none" fill="#666">/  Triage  /  content-training  /  Item #142  ·  reflection</text>

  <!-- Route sidebar (dimmed in modal context) -->
  <line x1="240" y1="56" x2="240" y2="800" />
  <g transform="translate(16,80)" stroke="none" font-size="12" fill="#666"><text>QUEUE</text></g>
  <g font-size="14" stroke="none" fill="#666">
    <text x="16" y="120">Workbench</text>
    <text x="16" y="144">Items</text>
    <text x="16" y="168">Guidance</text>
    <text x="16" y="192">Workflow</text>
    <text x="16" y="216">Transition actions</text>
  </g>

  <!-- Dim backdrop indicator -->
  <rect x="240" y="56" width="1040" height="744" fill="#e6e6e6" stroke="none" opacity="0.5" />

  <!-- Reflection panel (centered overlay over right side of workbench) -->
  <g transform="translate(280,96)">
    <rect width="976" height="688" rx="8" fill="#fff" stroke="#000" stroke-width="1.5" />

    <!-- Header -->
    <g transform="translate(24,24)">
      <text font-size="20" stroke="none" fill="#000">Reflection · before Approve</text>
      <text font-size="14" stroke="none" fill="#666" y="22">Triage Assistant compared the original item, your edits, the chat, and current guidance.</text>
      <text x="928" y="0" text-anchor="end" font-size="14" stroke="none" fill="#000">✕</text>
    </g>

    <!-- Context strip -->
    <g transform="translate(24,96)">
      <rect width="928" height="48" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4" />
      <text x="12" y="20" font-size="12" stroke="none" fill="#666">SUMMARY</text>
      <text x="12" y="36" font-size="12" stroke="none" fill="#000">"Tighten launch-post intros and call out user-visible benchmarks in the headline."  · base revision rev-7</text>
    </g>

    <!-- Two-column diff -->
    <!-- Left: Guidance file picker -->
    <g transform="translate(24,168)">
      <text font-size="12" stroke="none" fill="#666">PROPOSING CHANGES TO</text>
    </g>
    <g transform="translate(24,184)">
      <rect width="216" height="40" rx="4" fill="#e6e6e6" stroke="none" />
      <text x="12" y="26" font-size="14" stroke="none" fill="#000">guidance.md</text>
      <text x="208" y="26" text-anchor="end" font-size="12" stroke="none" fill="#666">+8 / -2</text>
    </g>
    <g transform="translate(24,232)">
      <rect width="216" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
      <text x="12" y="26" font-size="14" stroke="none" fill="#666">style.md</text>
      <text x="208" y="26" text-anchor="end" font-size="12" stroke="none" fill="#666">no change</text>
    </g>
    <g transform="translate(24,280)">
      <rect width="216" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
      <text x="12" y="26" font-size="14" stroke="none" fill="#666">examples.md</text>
      <text x="208" y="26" text-anchor="end" font-size="12" stroke="none" fill="#666">+1 example</text>
    </g>
    <g transform="translate(24,328)">
      <rect width="216" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4" />
      <text x="12" y="26" font-size="14" stroke="none" fill="#666">+ propose new file</text>
    </g>

    <!-- Right: diff body -->
    <g transform="translate(264,168)">
      <text font-size="12" stroke="none" fill="#666">DIFF · guidance.md</text>
      <text x="688" text-anchor="end" font-size="12" stroke="none" fill="#666">Unified ▾  ·  Markdown ▾</text>
    </g>
    <g transform="translate(264,184)">
      <rect width="688" height="280" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
      <g font-size="14" stroke="none" font-family="ui-monospace, SF Mono, Menlo, monospace">
        <text x="12" y="24" fill="#666">  ## Tone</text>
        <text x="12" y="48" fill="#666">  - Use plain language. No marketing jargon.</text>
        <text x="12" y="76" fill="#000">- - Keep intros under 4 sentences.</text>
        <line x1="8" y1="64" x2="676" y2="64" stroke="#e6e6e6" />
        <text x="12" y="100" fill="#000">+ - Keep intros under 3 sentences.</text>
        <text x="12" y="124" fill="#000">+ - Call out user-visible benchmarks in the first paragraph.</text>
        <text x="12" y="156" fill="#666">  ## Structure</text>
        <text x="12" y="180" fill="#666">  - H2 sections for What's new, Why now, What's next.</text>
        <text x="12" y="208" fill="#000">+ ## Headlines</text>
        <text x="12" y="232" fill="#000">+ - Include the strongest concrete number when one exists.</text>
        <text x="12" y="256" fill="#000">+ - Prefer verbs over noun phrases.</text>
      </g>
    </g>

    <!-- Why this changed -->
    <g transform="translate(264,488)">
      <text font-size="12" stroke="none" fill="#666">WHY</text>
    </g>
    <g transform="translate(264,504)">
      <rect width="688" height="88" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 4" />
      <text x="12" y="24" font-size="14" stroke="none" fill="#000">You shortened the intro from 5 sentences to 3 and added "cut p95 latency by half"</text>
      <text x="12" y="44" font-size="14" stroke="none" fill="#000">to the headline. The assistant noticed both edits and is generalising them.</text>
      <text x="12" y="72" font-size="12" stroke="none" fill="#666">cites · chat turns 4–6  ·  diff applied via update_item_content  ·  edits in markdown editor</text>
    </g>

    <!-- Action row -->
    <line x1="0" y1="616" x2="976" y2="616" />
    <g transform="translate(24,640)">
      <rect width="160" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
      <text x="80" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">Reject proposal</text>
    </g>
    <g transform="translate(200,640)">
      <rect width="200" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
      <text x="100" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">Ask assistant to revise</text>
    </g>
    <g transform="translate(416,640)">
      <rect width="160" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" />
      <text x="80" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#000">Edit before accept</text>
    </g>
    <g transform="translate(792,640)">
      <rect width="160" height="40" rx="4" fill="#000" stroke="#000" stroke-width="1.5" />
      <text x="80" y="26" text-anchor="middle" font-size="14" stroke="none" fill="#fff">Accept · rev 8</text>
    </g>

    <!-- Footer note -->
    <g transform="translate(24,696)" stroke="none" font-size="12" fill="#666">
      <text>Accepting unblocks the Approve transition (reflection required for new → approved).</text>
    </g>
  </g>

  <!-- annotations -->
  <g font-size="12" font-weight="bold" stroke="none" fill="#d33">
    <circle cx="272" cy="144" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="148" text-anchor="middle">1</text>
    <circle cx="272" cy="208" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="212" text-anchor="middle">2</text>
    <circle cx="552" cy="280" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="552" y="284" text-anchor="middle">3</text>
    <circle cx="296" cy="664" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="296" y="668" text-anchor="middle">4</text>
    <circle cx="1064" cy="664" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="1064" y="668" text-anchor="middle">5</text>
  </g>
</svg>
