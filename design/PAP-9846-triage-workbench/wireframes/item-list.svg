  <!-- annotations -->
  <g font-size="12" font-weight="bold" stroke="none" fill="#d33">
    <circle cx="272" cy="184" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="188" text-anchor="middle">1</text>
    <circle cx="272" cy="264" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="272" y="268" text-anchor="middle">2</text>
    <circle cx="1048" cy="104" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="1048" y="108" text-anchor="middle">3</text>
    <circle cx="904" cy="264" r="10" stroke="#d33" fill="#fff" stroke-width="1.5" /><text x="904" y="268" text-anchor="middle">4</text>
