      <g transform="translate(36,16)"><rect width="32" height="20" rx="10" fill="#e6e6e6" /><text x="16" y="14" text-anchor="middle" font-size="12" stroke="none" fill="#000">12</text></g>
      <line x1="-8" y1="40" x2="76" y2="40" stroke="#000" stroke-width="3" />

      <text x="112" y="26" fill="#666">Approved</text>
      <g transform="translate(184,16)"><rect width="24" height="20" rx="10" fill="#fff" stroke="#000" stroke-width="1.5" /><text x="12" y="14" text-anchor="middle" font-size="12" stroke="none" fill="#000">4</text></g>

      <text x="232" y="26" fill="#666">Rejected</text>
      <g transform="translate(300,16)"><rect width="24" height="20" rx="10" fill="#fff" stroke="#000" stroke-width="1.5" /><text x="12" y="14" text-anchor="middle" font-size="12" stroke="none" fill="#000">2</text></g>

