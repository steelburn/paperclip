      <text x="16" y="68">#142</text><text x="80" y="68">Draft launch post</text>
      <text x="448" y="68" font-size="12" fill="#666">sourceKind: blog · priority: medium</text>
      <text x="704" y="68" font-size="12" fill="#666">ext-9210-blog</text>
      <text x="832" y="68" font-size="12" fill="#666">2m</text>
      <text x="912" y="68" font-size="12" fill="#666">—</text>

      <line x1="0" y1="88" x2="976" y2="88" stroke="#e6e6e6" />
      <text x="16" y="116">#141</text><text x="80" y="116">v2 pricing intro</text>
      <text x="448" y="116" font-size="12" fill="#666">sourceKind: blog · priority: high</text>
      <text x="704" y="116" font-size="12" fill="#666">ext-9209-blog</text>
      <text x="832" y="116" font-size="12" fill="#666">14m</text>
      <text x="912" y="116" font-size="12" fill="#666">—</text>

      <line x1="0" y1="136" x2="976" y2="136" stroke="#e6e6e6" />
      <text x="16" y="164">#140</text><text x="80" y="164">Team page rewrite</text>
      <text x="448" y="164" font-size="12" fill="#666">sourceKind: blog · stat:views=1240</text>
      <text x="704" y="164" font-size="12" fill="#666">ext-9208-blog</text>
      <text x="832" y="164" font-size="12" fill="#666">1h</text>
      <text x="912" y="164" font-size="12" fill="#000">PAP-9912 ›</text>

      <line x1="0" y1="184" x2="976" y2="184" stroke="#e6e6e6" />
      <text x="16" y="212">#139</text><text x="80" y="212">Q3 announce</text>
      <text x="448" y="212" font-size="12" fill="#666">sourceKind: announce</text>
      <text x="704" y="212" font-size="12" fill="#666">—</text>
      <text x="832" y="212" font-size="12" fill="#666">3h</text>
      <text x="912" y="212" font-size="12" fill="#666">—</text>

      <line x1="0" y1="232" x2="976" y2="232" stroke="#e6e6e6" />
      <text x="16" y="260">#138</text><text x="80" y="260">Beta notes</text>
      <text x="448" y="260" font-size="12" fill="#666">sourceKind: changelog</text>
      <text x="704" y="260" font-size="12" fill="#666">—</text>
      <text x="832" y="260" font-size="12" fill="#666">5h</text>
      <text x="912" y="260" font-size="12" fill="#666">—</text>

      <line x1="0" y1="280" x2="976" y2="280" stroke="#e6e6e6" />
      <text x="16" y="308">#137</text><text x="80" y="308">Press blurb</text>
      <text x="448" y="308" font-size="12" fill="#666">sourceKind: press</text>
      <text x="704" y="308" font-size="12" fill="#666">—</text>
      <text x="832" y="308" font-size="12" fill="#666">8h</text>
      <text x="912" y="308" font-size="12" fill="#666">—</text>

      <line x1="0" y1="328" x2="976" y2="328" stroke="#e6e6e6" />
      <text x="16" y="356">#136</text><text x="80" y="356">Marketing newsletter</text>
      <text x="448" y="356" font-size="12" fill="#666">sourceKind: newsletter</text>
      <text x="704" y="356" font-size="12" fill="#666">nl-2026-05-19</text>
      <text x="832" y="356" font-size="12" fill="#666">1d</text>
      <text x="912" y="356" font-size="12" fill="#666">—</text>

      <text x="16" y="408" font-size="12" fill="#666">+ 5 more</text>
